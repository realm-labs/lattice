name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Structure
        run: scripts/check-structure.sh

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features

  docker-acceptance:
    name: Docker ${{ matrix.profile }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        profile: [quality, sim, model, e2e]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run pinned profile
        run: ./scripts/test-docker.sh ${{ matrix.profile }}
      - name: Enforce scoped image retention
        if: always()
        run: ./scripts/docker-image-lifecycle.sh cleanup

  kind-acceptance:
    name: kind EndpointSlice lifecycle
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run kind profile
        run: ./scripts/test-docker.sh k8s
      - name: Enforce scoped image retention
        if: always()
        run: ./scripts/docker-image-lifecycle.sh cleanup
