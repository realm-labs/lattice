syntax = "proto3";

package lattice.actor;

// Serializable identity of one exact actor activation. Logical EntityRef and
// SingletonRef values use their own business-facing declarations.
message ActorRef {
  string cluster_id = 1;
  string node_host = 2;
  uint32 node_port = 3;
  bytes node_incarnation = 4; // exactly 16 bytes, big endian
  string actor_path = 5;
  uint64 activation_sequence = 6;
  uint64 protocol_id = 7;
}
