syntax = "proto3";

package lattice.placement.control;

service LogicControl {
  rpc ActivateActor(ActivateActorRequest) returns (ActivateActorReply);
  rpc ActivateSingleton(ActivateSingletonRequest) returns (ActivateSingletonReply);
  rpc PrepareVirtualShardMigration(PrepareVirtualShardMigrationRequest) returns (PrepareVirtualShardMigrationReply);
}

service PlacementCoordinator {
  rpc RegisterInstance(RegisterInstanceRequest) returns (InstanceLivenessReply);
  rpc KeepaliveInstance(InstanceLivenessRequest) returns (InstanceLivenessReply);
  rpc TransitionInstance(TransitionInstanceRequest) returns (InstanceLivenessReply);
  rpc KeepaliveSingletons(KeepaliveSingletonsRequest) returns (KeepaliveSingletonsReply);
  rpc ActivateActor(ActivateActorRequest) returns (ActorPlacementReply);
  rpc ActivateSingleton(ActivateSingletonRequest) returns (SingletonPlacementReply);
  rpc GetInstance(GetInstanceRequest) returns (GetInstanceReply);
  rpc GetActor(GetActorRequest) returns (GetActorReply);
  rpc GetSingleton(GetSingletonRequest) returns (GetSingletonReply);
  rpc GetServicePlacementSnapshot(GetServicePlacementSnapshotRequest) returns (GetServicePlacementSnapshotReply);
  rpc DrainInstance(DrainInstanceRequest) returns (DrainInstanceReply);
}

message GetInstanceRequest {
  string instance_id = 1;
}

message GetInstanceReply {
  optional InstanceRecord record = 1;
}

message InstanceRecord {
  string service_kind = 1;
  string instance_id = 2;
  string instance_incarnation = 3;
  uint64 lease_id = 4;
  string advertised_endpoint = 5;
  string control_endpoint = 6;
  string version = 7;
  string state = 8;
  optional uint64 max_actors = 9;
  optional uint64 max_connections = 10;
  map<string, string> labels = 11;
}

message GetActorRequest {
  string service_kind = 1;
  string actor_kind = 2;
  ActorId actor_id = 3;
}

message GetActorReply {
  optional VersionedActorPlacement record = 1;
}

message VersionedActorPlacement {
  uint64 version = 1;
  ActorPlacementReply placement = 2;
}

message GetSingletonRequest {
  string service_kind = 1;
  string singleton_kind = 2;
  string scope = 3;
}

message GetSingletonReply {
  optional VersionedSingletonPlacement record = 1;
}

message VersionedSingletonPlacement {
  uint64 version = 1;
  SingletonPlacementReply placement = 2;
}

message GetServicePlacementSnapshotRequest {
  string service_kind = 1;
  string instance_id = 2;
  uint32 max_entries = 3;
}

message GetServicePlacementSnapshotReply {
  uint64 revision = 1;
  optional InstanceRecord local_instance = 2;
  repeated ServicePlacementRecord records = 3;
}

message ServicePlacementRecord {
  uint64 revision = 1;
  oneof record {
    ActorPlacementReply actor = 2;
    VirtualShardPlacement virtual_shard = 3;
    SingletonPlacementReply singleton = 4;
  }
}

message VirtualShardPlacement {
  string service_kind = 1;
  string actor_kind = 2;
  uint32 shard_id = 3;
  string owner_instance_id = 4;
  uint64 epoch = 5;
}

message SingletonLeaseClaim {
  string service_kind = 1;
  string singleton_kind = 2;
  string scope = 3;
  string owner_instance_id = 4;
  string owner_incarnation = 5;
  uint64 epoch = 6;
  uint64 lease_id = 7;
}

message KeepaliveSingletonsRequest {
  string service_kind = 1;
  string instance_id = 2;
  string instance_incarnation = 3;
  repeated SingletonLeaseClaim claims = 4;
}

message KeepaliveSingletonsReply {
  string service_kind = 1;
  string instance_id = 2;
  string instance_incarnation = 3;
  uint64 renewed = 4;
}

message RegisterInstanceRequest {
  string service_kind = 1;
  string instance_id = 2;
  string instance_incarnation = 3;
  string advertised_endpoint = 4;
  string control_endpoint = 5;
  string version = 6;
  optional uint64 max_actors = 7;
  optional uint64 max_connections = 8;
  map<string, string> labels = 9;
}

message InstanceLivenessRequest {
  string service_kind = 1;
  string instance_id = 2;
  string instance_incarnation = 3;
  uint64 expected_lease_id = 4;
}

message TransitionInstanceRequest {
  string service_kind = 1;
  string instance_id = 2;
  string instance_incarnation = 3;
  uint64 expected_lease_id = 4;
  string state = 5;
}

message InstanceLivenessReply {
  string service_kind = 1;
  string instance_id = 2;
  string instance_incarnation = 3;
  uint64 lease_id = 4;
  string state = 5;
}

message ActivateActorRequest {
  string service_kind = 1;
  string actor_kind = 2;
  ActorId actor_id = 3;
  uint64 epoch = 4;
}

message ActorId {
  oneof value {
    string str_value = 1;
    uint64 u64_value = 2;
    int64 i64_value = 3;
    bytes bytes_value = 4;
  }
}

message ActivateActorReply {}

message ActivateSingletonRequest {
  string service_kind = 1;
  string singleton_kind = 2;
  string scope = 3;
  uint64 epoch = 4;
}

message ActivateSingletonReply {}

message PrepareVirtualShardMigrationRequest {
  string service_kind = 1;
  string actor_kind = 2;
  uint32 shard_id = 3;
  uint32 shard_count = 4;
  uint64 owner_epoch = 5;
}

message PrepareVirtualShardMigrationReply {
  bool eligible = 1;
  uint64 running_actors = 2;
  uint64 passivated_actors = 3;
}

message ActorPlacementReply {
  string actor_kind = 1;
  ActorId actor_id = 2;
  string owner_instance_id = 3;
  uint64 epoch = 4;
  uint64 lease_id = 5;
  string state = 6;
  string service_kind = 7;
}

message SingletonPlacementReply {
  string service_kind = 1;
  string singleton_kind = 2;
  string scope = 3;
  string owner_instance_id = 4;
  uint64 epoch = 5;
  uint64 lease_id = 6;
  string state = 7;
  string owner_incarnation = 8;
}

message DrainInstanceRequest {
  string service_kind = 1;
  string instance_id = 2;
  uint64 expected_lease_id = 3;
  string instance_incarnation = 4;
}

message DrainInstanceReply {
  string service_kind = 1;
  string drained_instance_id = 2;
  uint64 migrated_actors = 3;
  uint64 migrated_virtual_shards = 4;
  uint64 drained_lease_id = 5;
  DrainInstanceOutcome outcome = 6;
  string drained_instance_incarnation = 7;
}

enum DrainInstanceOutcome {
  DRAIN_INSTANCE_OUTCOME_UNSPECIFIED = 0;
  DRAIN_INSTANCE_OUTCOME_COMPLETED = 1;
  DRAIN_INSTANCE_OUTCOME_NO_READY_REPLACEMENT = 2;
}
