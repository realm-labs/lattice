syntax = "proto3";

package bench;

message PingRequest {
  uint64 actor_id = 1;
  uint64 sequence = 2;
  bytes payload = 3;
}

message PingReply {
  uint64 actor_id = 1;
  uint64 sequence = 2;
  uint64 actor_seen = 3;
}

message ChainPingRequest {
  uint64 actor_id = 1;
  uint64 worker_actor_id = 2;
  uint64 sequence = 3;
}

message ChainPingReply {
  uint64 actor_id = 1;
  uint64 worker_actor_id = 2;
  uint64 sequence = 3;
  uint64 chain_seen = 4;
  uint64 worker_seen = 5;
}

message WorkRequest {
  uint64 worker_actor_id = 1;
  uint64 sequence = 2;
}

message WorkReply {
  uint64 worker_actor_id = 1;
  uint64 sequence = 2;
  uint64 worker_seen = 3;
}
