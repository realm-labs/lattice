apiVersion: v1
kind: ServiceAccount
metadata:
  name: lattice-probe
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lattice-probe-endpointslices
rules:
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lattice-probe-endpointslices
subjects:
  - kind: ServiceAccount
    name: lattice-probe
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lattice-probe-endpointslices
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lattice-probe
spec:
  replicas: 2
  selector:
    matchLabels: {app: lattice-probe}
  strategy:
    rollingUpdate: {maxUnavailable: 1, maxSurge: 1}
  template:
    metadata:
      labels: {app: lattice-probe}
    spec:
      serviceAccountName: lattice-probe
      terminationGracePeriodSeconds: 20
      containers:
        - name: probe
          image: lattice-k8s-probe:local
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef: {fieldPath: metadata.namespace}
          ports: [{name: http, containerPort: 8080}]
          startupProbe:
            httpGet: {path: /startup, port: http}
            failureThreshold: 30
            periodSeconds: 1
          readinessProbe:
            httpGet: {path: /ready, port: http}
            periodSeconds: 1
          livenessProbe:
            httpGet: {path: /live, port: http}
            periodSeconds: 2
          lifecycle:
            preStop:
              exec: {command: ["sh", "-c", "touch /tmp/lattice-draining; while [ ! -f /tmp/lattice-drain-ack ]; do sleep 0.1; done"]}
          resources:
            requests: {cpu: 10m, memory: 32Mi}
            limits: {cpu: 250m, memory: 128Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: lattice-probe
spec:
  selector: {app: lattice-probe}
  ports: [{name: http, port: 80, targetPort: http}]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lattice-probe
spec:
  minAvailable: 1
  selector:
    matchLabels: {app: lattice-probe}
