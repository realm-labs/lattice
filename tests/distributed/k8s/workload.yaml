apiVersion: apps/v1
kind: Deployment
metadata:
  name: lattice-probe
spec:
  replicas: 2
  selector:
    matchLabels: {app: lattice-probe}
  strategy:
    rollingUpdate: {maxUnavailable: 1, maxSurge: 1}
  template:
    metadata:
      labels: {app: lattice-probe}
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: probe
          image: lattice-k8s-probe:local
          imagePullPolicy: IfNotPresent
          ports: [{name: http, containerPort: 8080}]
          startupProbe:
            httpGet: {path: /startup, port: http}
            failureThreshold: 30
            periodSeconds: 1
          readinessProbe:
            httpGet: {path: /ready, port: http}
            periodSeconds: 1
          livenessProbe:
            httpGet: {path: /live, port: http}
            periodSeconds: 2
          lifecycle:
            preStop:
              exec: {command: ["sh", "-c", "touch /tmp/lattice-draining; while [ ! -f /tmp/lattice-drain-ack ]; do :; done"]}
          resources:
            requests: {cpu: 10m, memory: 8Mi}
            limits: {cpu: 100m, memory: 32Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: lattice-probe
spec:
  selector: {app: lattice-probe}
  ports: [{name: http, port: 80, targetPort: http}]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lattice-probe
spec:
  minAvailable: 1
  selector:
    matchLabels: {app: lattice-probe}
